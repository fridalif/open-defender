name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          grep -v '/mocks/' coverage.out > coverage.nomocks.out
          pct=$(go tool cover -func=coverage.nomocks.out | awk '/^total:/{print substr($3, 1, length($3)-1)}')
          echo "COVERAGE=$pct" >> "$GITHUB_ENV"

      - if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 7fa26c09b8c489d79bbbaf8d53726345
          filename: open-defender-coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          valColorRange: ${{ env.COVERAGE }}
          minColorRange: 50
          maxColorRange: 90

  release:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < version.txt)"

          if [ -z "$version" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

          if gh release view "$version" >/dev/null 2>&1; then
            echo "release $version is already out, nothing to build"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.version.outputs.exists == 'false'
        env:
          ZIG_VERSION: 0.16.0
          ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
        run: |
          curl -sSLo zig.tar.xz "https://ziglang.org/download/$ZIG_VERSION/zig-x86_64-linux-$ZIG_VERSION.tar.xz"
          echo "$ZIG_SHA256  zig.tar.xz" | sha256sum -c -

          mkdir -p "$RUNNER_TEMP/zig"
          tar -xf zig.tar.xz -C "$RUNNER_TEMP/zig" --strip-components=1
          rm zig.tar.xz

          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"

      - if: steps.version.outputs.exists == 'false'
        env:
          CGO_ENABLED: 1
          TAGS: netgo osusergo sqlite_omit_load_extension
          LDFLAGS: -s -w
        run: |
          mkdir -p dist

          build() {
            arch="$1" goarch="$2" target="$3" goarm="$4"

            echo "::group::open-defender_$arch"
            GOARCH="$goarch" GOARM="$goarm" CC="zig cc -target $target" \
              go build -tags "$TAGS" -ldflags "$LDFLAGS" -o "dist/open-defender_$arch" ./cmd
            file "dist/open-defender_$arch"
            echo "::endgroup::"
          }

          build amd64 amd64 x86_64-linux-musl   ""
          build 386   386   x86-linux-musl       ""
          build arm64 arm64 aarch64-linux-musl  ""
          build arm32 arm   arm-linux-musleabihf 7

      - if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/open-defender_amd64 \
            dist/open-defender_386 \
            dist/open-defender_arm64 \
            dist/open-defender_arm32
